name: Deploy Exabyte Website App

on:
  push:
    branches: [ main ]
    
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo $(date)
            echo *=== GIT SITE PUBLISH START ===*
            echo === RUN PRE-PUBLISH SCRIPT ===
            rm -rf /home/exabytewebsitehost/prepublishtmp
            mkdir /home/exabytewebsitehost/prepublishtmp
            wget -P /home/exabytewebsitehost/prepublishtmp/ https://gh-proxy.org/https://raw.githubusercontent.com/Exabyte-Technologies/Exabyte-Website/refs/heads/main/prepublish.sh
            sudo bash /home/exabytewebsitehost/prepublishtmp/prepublish.sh
            rm -rf /home/exabytewebsitehost/prepublishtmp
            echo === PRE-PUBLISH SCRIPT FINISHED ===
            cd /home/exabytewebsitehost/Exabyte-Website
            echo === RESETTING LOCAL CHANGES ===
            git reset --hard HEAD
            echo === RESET LOCAL CHANGES FINISHED ===
            echo === STARTING GIT PULL ===
            git pull https://gh-proxy.org/https://github.com/Exabyte-Technologies/Exabyte-Website.git main
            echo === GIT PULL FINISHED ===
            echo === STARTING VENV ACTIVATION ===
            source venv/bin/activate
            echo === VENV ACTIVATION FINISHED ===
            echo === STARTING REQUIREMENTS INSTALLATION ===
            pip install -r requirements.txt
            echo === REQUIREMENTS INSTALLATION FINISHED ===
            echo === RUN POST-PUBLISH SCRIPT ===
            sudo bash /home/exabytewebsitehost/Exabyte-Website/postpublish.sh
            echo === POST-PUBLISH SCRIPT FINISHED ===
            echo === STARTING SYSTEMCTL RESTART ===
            sudo systemctl restart exabytewebsite
            echo === SYSTEMCTL RESTART FINISHED ===
            echo === RUN EXIT PUBLISH SCRIPT ===
            sudo bash /home/exabytewebsitehost/Exabyte-Website/exitpublish.sh
            echo === EXIT PUBLISH SCRIPT FINISHED ===
            echo *=== GIT SITE PUBLISH FINISHED ===*
            echo $(date)
