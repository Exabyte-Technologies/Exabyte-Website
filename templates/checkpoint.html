<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just a moment...</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@cap.js/widget"></script>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff; color: #1d1d1d;
        }
        .cf-wrapper { max-width: 500px; width: 100%; padding: 20px; text-align: center; }
        h1 { font-size: 24px; font-weight: 500; margin-bottom: 8px; }
        p { color: #595959; font-size: 15px; margin-bottom: 30px; }
        .cf-challenge { margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .alert { margin-bottom: 15px; font-size: 14px; }
        .captcha {
            width: fit-content;
        }
    </style>
</head>
<body>
    <div class="cf-wrapper">
        <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:16px;">
            <img src="/static/resources/exabyte.png" alt="Exabyte logo" style="height:40px; width:auto;" />
            <span style="font-size:22px; font-weight:600; color:#1d1d1d;">Exabyte</span>
        </div>
        <hr style="border:none; height:1px; background:#e0e0e0; margin:0 auto 16px; width:20%;" />
        <h1>Verify you are human</h1>
        <p>Let's confirm you are not a robot before continuing.</p>
        {% if error %}<div class="alert">{{ error }}</div>{% endif %}
        <div class="cf-challenge">
            <form method="POST">
                <cap-widget id="cap" data-cap-api-endpoint="/api/cap/">Captcha loading, please wait ...</cap-widget>
                <button id="submitCaptcha" type="submit" style="display: none;"></button>
            </form>
            <div id="captchaHint" style="margin-top: 16px; min-height: 20px; font-size: 14px; opacity: 0; transition: opacity 0.35s ease;">&nbsp;</div>
        </div>
    </div>
    <footer style="position:fixed; bottom:20px; left:0; width:100%; text-align:center; font-size:12px; color:#999;">&copy; 2026 Exabyte. All rights reserved. | <a class="beian" href="https://beian.miit.gov.cn/" target="_blank" style="color:#999; text-decoration:none;">京ICP备2026012142号-1</a></footer>
    <script>
        const capWidget = document.getElementById("cap");
        const submitButton = document.getElementById("submitCaptcha");
        const captchaHint = document.getElementById("captchaHint");

        const initialPhrases = [
            "Prove your organic heart.",
            "Real humans click here.",
            "Are you a robot?",
            "No bots allowed inside.",
            "Verify your pulse, please.",
            "Show us those neurons.",
            "Just a quick check-in.",
            "Human test: Start here.",
            "Seeking a real person.",
            "Prove you're not metal.",
            "Hearts and thumbs only.",
            "Validation for non-robots.",
            "Are you actually real?",
            "Click if you're breathing.",
            "Are you a robot or not?",
            "Only humans may pass.",
            "Verify your fleshy status.",
            "Quick check for circuits.",
            "Not a machine? Prove it.",
            "We like humans best.",
            "Digital-free zone ahead.",
            "Show us your humanity.",
            "Confirm your human-ness.",
            "Biological entities only!",
            "Are you 100% human?",
            "Verify your human vibe."
        ];

        const randomInitialPhrase = initialPhrases[Math.floor(Math.random() * initialPhrases.length)];
        capWidget.setAttribute('data-cap-i18n-initial-state', randomInitialPhrase);
        capWidget.setAttribute('data-cap-i18n-verify-aria-label', randomInitialPhrase);

        const phrasesVerified = [
            "Beep boop? Not today!",
            "Pure human excellence.",
            "Zero circuits found here.",
            "Organic lifeform detected.",
            "High-five, fellow mammal!",
            "100% genuine person.",
            "Nice job, skin-haver.",
            "Authentically you.",
            "Confirmed: Not metal.",
            "Squares: 0. Human: 1.",
            "Take that, algorithms!",
            "Victory for humanity!",
            "Robot-free zone secured.",
            "It's nice being a human.",
            "So very un-robotic.",
            "Brains over batteries.",
            "Hooray, real person!",
            "Welcome back, human.",
            "Stay human, stay cool.",
            "Simply marvelous human.",
            "Yay! No wires.",
            "Sweet, sweet humanity.",
            "Humanity confirmed!",
            "Basically a genius.",
            "Go forth, human!",
            "Bots: 0. Humans: 1",
            "Victory for humans!",
            "You shall pass!",
            "Entering human-only area.",
            "Bot -1, Human +1",
            "Results are in: Human.",
            "Have a nice day!",
            "Definitely human"
        ];

        const randomPhraseVerified = phrasesVerified[Math.floor(Math.random() * phrasesVerified.length)];
        capWidget.setAttribute('data-cap-i18n-solved-label', randomPhraseVerified);
        capWidget.setAttribute('data-cap-i18n-verified-aria-label', randomPhraseVerified);

        const phrasesVerifying = [
            "Scanning for circuits...",
            "Sniffing for BIOS...",
            "Checking for pulse...",
            "Detecting human vibes...",
            "Hunting for metal...",
            "Analyzing carbon levels...",
            "Testing for soul...",
            "Inspecting for wires...",
            "Screening for software...",
            "Looking for skin...",
            "Peering into neurons...",
            "Feeling for warmth...",
            "Searching for DNA...",
            "Scanning for batteries...",
            "Sifting for silicon...",
            "Probing for imagination...",
            "Monitoring for glitches...",
            "Filtering out bots...",
            "Seeking real emotions...",
            "Measuring heart rate...",
            "Validating fleshy bits..."
        ];

        const randomVerifyingPhrase = phrasesVerifying[Math.floor(Math.random() * phrasesVerifying.length)];
        capWidget.setAttribute('data-cap-i18n-verifying-label', randomVerifyingPhrase);
        capWidget.setAttribute('data-cap-i18n-verifying-aria-label', randomVerifyingPhrase);

        var solving = false;

        capWidget.onprogress = () => { solving = true; };

        capWidget.addEventListener("solve", (event) => {
            setTimeout(() => {
                submitButton.click();
            }, 1000);
        });

        window.addEventListener("load", () => {
            setTimeout(() => {
                if (!solving && capWidget.innerHTML != 'Captcha loading, please wait ...') {
                    captchaHint.textContent = "Click on the box to verify.";
                    captchaHint.style.opacity = "1";
                    captchaHint.style.color = "#595959;"
                } else if (capWidget.innerHTML == 'Captcha loading, please wait ...') {
                    captchaHint.textContent = "Stuck? Try reloading the page.";
                    captchaHint.style.opacity = "1";
                    captchaHint.style.color = "#d93025;"
                }
            }, 15000);
        });
    </script>
</body>
</html>
